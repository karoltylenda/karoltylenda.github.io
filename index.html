<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css"> -->
    <link rel="stylesheet" href="/css/style.css">

    <script src="https://kit.fontawesome.com/a7b3ef69ce.js" crossorigin="anonymous"></script>

    <title>KT_DEV</title>
  </head>
<body>
    <div class="content" style="width: 100%">
        <div class="logo-top">
            <img src="/images/logo/logo-small.png">
        </div>
        <div class="intro-wrap">
            <p class="name-text">Karol Tylenda</p>
            <p class="p-light">Java Developer</p>
            <p class="heading-jumbo">Hello there!!! I'm a JAVA Developer</p>
        </div>
    </div>
    <!--SIDEBAR--> 
    <div class="menu" id="menu">
        <div class="menu-list" id="menu-list">
            <a href="#" onclick="removeMenuActive()">Home</a>
            <a href="#" onclick="removeMenuActive()">About</a>
            <a href="#" onclick="removeMenuActive()">Services</a>
            <a href="#" onclick="removeMenuActive()">Portfolio</a>
            <a href="#" onclick="removeMenuActive()">Contact</a>
        </div>
        <div class="menu-button" id="menu-button">
            <a href="#">Menu</a>
        </div>
        <div class="menu-close-button" id="menu-close-button">
            <a href="#">
            <ion-icon name="close-outline"></ion-icon>
            </a>
        </div>
    </div>
    <!--END OF SIDEBAR-->

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
<script>
    const menu = document.querySelector('#menu');
    const menuList = menu.querySelector('#menu-list');
    const menuButton = document.querySelector('#menu-button');
    const menuCloseButton = document.querySelector('#menu-close-button');
    menuCloseButton.onclick = () => {
        menuCloseButton.classList.remove('menu-close-button-active');
        menu.classList.remove('menu-active');
        menuList.classList.remove('menu-list-active');
        menuButton.classList.remove('menu-button-inactive');
    }
    menuButton.onclick = () => {
        menu.classList.add('menu-active');
        menuCloseButton.classList.add('menu-close-button-active');
        menuList.classList.add('menu-list-active');
        menuButton.classList.add('menu-button-inactive');
    }
</script>
</html>
